<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+G Window Cleaning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky: #e8f4fd;
            --sky-mid: #bddff7;
            --blue: #2a7fc1;
            --blue-dark: #1a5a8a;
            --ink: #18202c;
            --ink-mid: #3d4a5c;
            --ink-light: #7a8898;
            --ink-faint: #b8c4cf;
            --rule: #dde4eb;
            --white: #ffffff;
            --bg: #f2f7fb;
        }

        html { font-size: 16px; }

        body {
            background-color: var(--bg);
            background-image:
                repeating-linear-gradient(
                    -62deg,
                    transparent 0px,
                    transparent 68px,
                    rgba(186, 221, 243, 0.18) 68px,
                    rgba(186, 221, 243, 0.18) 72px
                ),
                repeating-linear-gradient(
                    -62deg,
                    transparent 0px,
                    transparent 160px,
                    rgba(160, 206, 235, 0.10) 160px,
                    rgba(160, 206, 235, 0.10) 168px
                );
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Layout ── */
        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 28px;
        }

        /* ── Top bar ── */
        .topbar {
            background: var(--blue-dark);
            color: var(--sky-mid);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-align: center;
            padding: 9px 16px;
        }

        /* ── Header ── */
        header {
            padding: 36px 0 28px;
            border-bottom: 1px solid var(--rule);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }

        .logo-wrap {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
        }
        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 400;
            line-height: 1.1;
            color: var(--ink);
            letter-spacing: -0.02em;
        }
        .brand .operators {
            margin-top: 5px;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--ink-light);
        }

        .contact {
            text-align: right;
            flex-shrink: 0;
        }
        .contact a {
            display: block;
            text-decoration: none;
            transition: color 0.15s;
        }
        .contact .phone {
            font-family: 'DM Serif Display', serif;
            font-size: 1.45rem;
            color: var(--blue-dark);
        }
        .contact .phone:hover { color: var(--blue); }
        .contact .email {
            font-size: 0.84rem;
            color: var(--ink-light);
            margin-top: 3px;
        }
        .contact .email:hover { color: var(--blue); }
        .contact .quote-note {
            margin-top: 5px;
            font-size: 0.72rem;
            color: var(--ink-faint);
            letter-spacing: 0.04em;
        }

        /* ── Main grid ── */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 56px;
            padding: 52px 0 64px;
        }

        @media (max-width: 640px) {
            main { grid-template-columns: 1fr; gap: 48px 0; }
            header { flex-direction: column; align-items: flex-start; }
            .contact { text-align: left; }
        }

        /* ── Section labels ── */
        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--blue);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--sky-mid);
        }

        /* ── Pricing ── */
        .pricing-section { margin-bottom: 44px; }

        .price-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 16px 12px;
            border-bottom: 1px solid var(--rule);
            gap: 12px;
            transition: background 0.18s, border-color 0.18s;
            cursor: default;
            border-radius: 6px 6px 0 0;
            margin: 0 -12px;
        }
        .price-row:hover {
            background: rgba(189, 223, 247, 0.22);
            border-color: var(--sky-mid);
        }
        .price-row:first-of-type { border-top: 1px solid var(--rule); }

        .price-label {
            font-size: 1.05rem;
            color: var(--ink);
            font-weight: 500;
        }
        .price-desc {
            font-size: 0.8rem;
            color: var(--ink-light);
            margin-top: 2px;
        }
        .price-amount {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4rem;
            color: var(--blue-dark);
            white-space: nowrap;
            transition: color 0.15s;
        }
        .price-row:hover .price-amount { color: var(--blue); }

        /* ── Service area ── */
        .service-area p {
            font-size: 1rem;
            font-weight: 300;
            color: var(--ink-mid);
            line-height: 1.7;
        }

        /* ── Schedule ── */
        .schedule-section { margin-bottom: 44px; }

        .schedule-days {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 16px;
        }

        .period-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 10px;
            border-bottom: 1px dashed var(--rule);
            font-size: 0.9rem;
            gap: 12px;
            transition: background 0.18s, border-color 0.18s;
            cursor: default;
            border-radius: 4px;
            margin: 0 -10px;
        }
        .period-row:first-child { border-top: 1px dashed var(--rule); }
        .period-row:hover {
            background: rgba(189, 223, 247, 0.20);
            border-color: var(--sky-mid);
        }
        .period-dates { color: var(--ink-light); }
        .period-hours { font-weight: 600; color: var(--ink); }

        .process-list { list-style: none; }
        .process-item {
            display: flex;
            gap: 16px;
            padding: 12px 10px;
            cursor: default;
            border-radius: 6px;
            margin: 0 -10px;
            transition: background 0.18s;
        }
        .process-item + .process-item { border-top: 1px solid var(--rule); }
        .process-item:hover { background: rgba(189, 223, 247, 0.20); }

        .step-num {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: var(--sky-mid);
            line-height: 1;
            padding-top: 2px;
            transition: color 0.15s;
            flex-shrink: 0;
            width: 28px;
        }
        .process-item:hover .step-num { color: var(--blue); }

        .step-text {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--ink-mid);
            line-height: 1.6;
            padding-top: 3px;
            transition: color 0.15s;
        }
        .process-item:hover .step-text { color: var(--ink); }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--rule);
            padding: 20px 0 32px;
            font-size: 0.75rem;
            color: var(--ink-faint);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        footer span { color: var(--ink-light); }
    </style>
</head>
<body>

    <div class="topbar">Free on-site quotes &nbsp;·&nbsp; Serving New Johnsonville &amp; Waverly, TN</div>

    <div class="page">

        <header>
            <div style="display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap;">
                <div class="logo-wrap">
                    <img src="./logo.png" alt="A+G Window Cleaning Logo" onerror="this.style.display='none'" />
                </div>
                <div class="brand">
                    <h1 id="ui-company-name"></h1>
                    <p class="operators" id="ui-company-operators"></p>
                </div>
            </div>
            <div class="contact">
                <a class="phone" href="#" id="ui-company-phone"></a>
                <a class="email" href="#" id="ui-company-email"></a>
                <p class="quote-note">Final quotes provided on-site</p>
            </div>
        </header>

        <main>

            <!-- Left -->
            <div>
                <section class="pricing-section">
                    <h2 class="section-label">Pricing</h2>
                    <div class="price-row">
                        <div>
                            <div class="price-label" id="ui-std-label"></div>
                            <div class="price-desc" id="ui-std-desc"></div>
                        </div>
                        <span class="price-amount" id="ui-std-price"></span>
                    </div>
                    <div class="price-row">
                        <div>
                            <div class="price-label" id="ui-snd-label"></div>
                            <div class="price-desc" id="ui-snd-desc"></div>
                        </div>
                        <span class="price-amount" id="ui-snd-price"></span>
                    </div>
                </section>

                <section class="service-area">
                    <h2 class="section-label">Service Area</h2>
                    <p id="ui-service-area"></p>
                </section>
            </div>

            <!-- Right -->
            <div>
                <section class="schedule-section">
                    <h2 class="section-label">Hours of Operation</h2>
                    <p class="schedule-days" id="ui-schedule-days"></p>
                    <div id="ui-schedule-periods"></div>
                </section>

                <section>
                    <h2 class="section-label">How It Works</h2>
                    <ul class="process-list" id="ui-process"></ul>
                </section>
            </div>

        </main>

        <footer>
            <span id="ui-footer-copy"></span>
        </footer>

    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
</body>
</html>
